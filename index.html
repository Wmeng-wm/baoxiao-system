<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>单锭机工艺计算器 v4.0 </title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei";
  background:#f4f7f9;
  padding:12px;
}
.wrap{max-width:520px;margin:auto;}
.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
.title{
  text-align:center;
  font-weight:800;
  font-size:18px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
label{font-size:12px;color:#64748b;font-weight:bold;}
input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #cbd5e1;
  font-size:16px;
}

.mode{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}
.mode div{
  flex:1;
  text-align:center;
  padding:6px;
  border-radius:6px;
  background:#e2e8f0;
  cursor:pointer;
}
.mode .on{background:#22c55e;color:#fff;}

.kpi{
  background:#ecfdf5;
  padding:12px;
  border-radius:10px;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}
.warn{color:red;font-size:12px;text-align:center;margin-top:5px;}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <div class="title">单锭机工艺计算器 v4.0</div>
</div>

<div class="card">

<div class="mode">
  <div id="mW" class="on" onclick="setMode('W')">求宽度</div>
  <div id="mD" onclick="setMode('D')">求D</div>
  <div id="mP" onclick="setMode('P')">求节距</div>
</div>

<div class="mode">
  <div id="exp" class="on" onclick="setCalcMode('exp')">经验模式</div>
  <div id="eng" onclick="setCalcMode('eng')">工程模式</div>
</div>

<div class="grid">

<div>
<label>锭数 N</label>
<input id="N" value="17">
</div>

<div>
<label>结构</label>
<select id="craft">
<option value="1x1">1×1</option>
<option value="1x2" selected>1×2</option>
<option value="2x2">2×2</option>
</select>
</div>

<div>
<label>宽度 W(mm)</label>
<input id="W" value="3.0">
</div>

<div>
<label>旦尼尔 D</label>
<input id="D" value="400">
</div>

<div>
<label>节距 P(mm)</label>
<input id="P" value="15">
</div>

<div>
<label>材料系数 k</label>
<input id="k" value="0.01189">
</div>

<div>
<label>填充系数</label>
<input id="fill" value="0.75">
</div>

<div>
<label>工艺损失</label>
<input id="loss" value="0.35">
</div>

</div>

</div>

<div class="card">

<div class="kpi"><span>宽度</span><span id="outW">-</span></div>
<div class="kpi"><span>旦尼尔</span><span id="outD">-</span></div>
<div class="kpi"><span>角度</span><span id="outA">-</span></div>
<div class="kpi"><span>单丝直径</span><span id="outd">-</span></div>

<div class="warn" id="warn"></div>

</div>

</div>

<script>

let mode="W";
let calcMode="exp";

function setMode(m){
  mode=m;
  document.querySelectorAll("#mW,#mD,#mP").forEach(i=>i.classList.remove("on"));
  document.getElementById("m"+m).classList.add("on");
}

function setCalcMode(m){
  calcMode=m;
  document.querySelectorAll("#exp,#eng").forEach(i=>i.classList.remove("on"));
  document.getElementById(m).classList.add("on");
}

function calc(){

let N=+N_in.value;
let W=+W_in.value;
let D=+D_in.value;
let P=+P_in.value;
let k=+k_in.value;
let fill=+fill_in.value;
let loss=+loss_in.value;

let craft={
"1x1":1.0,
"1x2":0.82,
"2x2":0.68
}[craft_in.value];

// 有效覆盖（关键）
let cover = craft * 0.6;

let d = k*Math.sqrt(D);

if(calcMode==="exp"){

  let C=fill*loss;
  let power=0.375;

  if(mode==="W"){
    W=N*d*C*Math.pow(P,power);
    W_in.value=W.toFixed(2);
  }

  if(mode==="D"){
    D=Math.pow(W/(N*k*C*Math.pow(P,power)),2);
    D_in.value=Math.round(D);
  }

  if(mode==="P"){
    P=Math.pow(W/(N*d*C),1/power);
    P_in.value=P.toFixed(2);
  }

}else{

  // 工程模型
  if(mode==="W"){
    W = N * cover * d / fill;
    W_in.value=W.toFixed(2);
  }

  if(mode==="D"){
    D = Math.pow((W*fill)/(N*cover*k),2);
    D_in.value=Math.round(D);
  }

  if(mode==="P"){
    // 反推节距（通过角度）
    let angle=60;
    P = Math.PI*W/Math.tan(angle*Math.PI/180);
    P_in.value=P.toFixed(2);
  }

}

// 角度
let angle=Math.atan(Math.PI*W/(P||1))*180/Math.PI;

outW.innerText=W.toFixed(2)+" mm";
outD.innerText=Math.round(D)+" D";
outA.innerText=angle.toFixed(1)+"°";
outd.innerText=d.toFixed(4)+" mm";

// 报警
if(angle>75){
  warn.innerText="⚠ 编织角过大，容易翻带/不稳定";
}else if(angle<25){
  warn.innerText="⚠ 编织角过小，结构松散";
}else{
  warn.innerText="";
}

}

const N_in=N,D_in=D,P_in=P,W_in=W,k_in=k,fill_in=fill,loss_in=loss,craft_in=craft;

document.querySelectorAll("input,select").forEach(i=>{
  i.addEventListener("input",calc);
});

calc();

</script>

</body>
</html>
