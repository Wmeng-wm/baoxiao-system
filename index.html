<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>单锭机工艺计算器</title>

<style>
/* 全局重置，防止溢出 */
* {
  box-sizing: border-box;
}

:root {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
  --sub: #475569;
  --pri: #22c55e;
  --pri2: #16a34a;
  --border: #cbd5e1;
}

body {
  margin: 0;
  background: #f8fafc;
  font-family: -apple-system, "Microsoft YaHei", sans-serif;
  color: var(--text);
  padding-bottom: 40px;
}

.wrap {
  max-width: 580px; /* 紧凑宽度 */
  margin: 15px auto;
  padding: 0 12px;
}

.card {
  background: var(--card);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  border: 1px solid #e2e8f0;
}

.title {
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  text-align: center;
}

.sub {
  font-size: 12px;
  color: var(--sub);
  text-align: center;
  margin-top: 4px;
}

/* 求解模式切换 */
.mode-toggle {
  display: flex;
  background: #f1f5f9;
  padding: 4px;
  border-radius: 8px;
  margin: 15px 0;
}
.mode-btn {
  flex: 1;
  text-align: center;
  padding: 8px 0;
  font-size: 13px;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
  color: var(--sub);
  transition: 0.2s;
}
.mode-btn.active {
  background: #fff;
  color: var(--pri2);
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

label {
  font-size: 13px;
  font-weight: 700;
  color: #334155;
}

input, select {
  width: 100%; /* 确保填满容器不溢出 */
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff;
  font-size: 14px;
  transition: all 0.2s;
}

input:focus {
  outline: none;
  border-color: var(--pri);
  box-shadow: 0 0 0 3px rgba(34,197,94,.1);
}

input[readonly] {
  background-color: #f8fafc;
  color: var(--pri2);
  font-weight: 800;
  border-color: #e2e8f0;
}

.calc-btn {
  grid-column: span 2;
  background: var(--pri);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 8px;
  box-shadow: 0 4px 10px rgba(34,197,94,0.2);
}

.calc-btn:hover {
  background: var(--pri2);
}

/* KPI 样式 */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.kpi {
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  border: 1px solid #bbf7d0;
}

.kpi .t { font-size: 11px; color: #166534; font-weight: bold; margin-bottom: 5px; }
.kpi .v { font-size: 22px; font-weight: 900; color: #064e3b; }
.kpi .v span { font-size: 12px; font-weight: normal; margin-left: 2px; }

.footer {
  text-align: center;
  margin-top: 25px;
  padding: 10px;
  border-top: 1px solid #e2e8f0;
}

.footer-text {
  color: #000000; /* 加黑 */
  font-weight: 900; /* 加粗 */
  font-size: 14px;
  letter-spacing: 1px;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <div class="title">单锭机工艺计算器</div>
    <div class="sub">真实工艺模型 · 覆盖率修正 · 联动逻辑优化</div>
  </div>

  <div class="card">
    <div class="mode-toggle">
      <div class="mode-btn active" id="mW" onclick="setMode('W')">求目标宽度 W</div>
      <div class="mode-btn" id="mD" onclick="setMode('D')">求旦尼尔 D</div>
      <div class="mode-btn" id="mP" onclick="setMode('P')">求节距 P</div>
    </div>

    <div class="grid">
      <div class="field">
        <label>锭数 (N)</label>
        <input type="number" id="N" value="17">
      </div>
      <div class="field">
        <label>结构</label>
        <select id="craft">
          <option value="1x1">1x1</option>
          <option value="1x2" selected>1x2</option>
          <option value="2x2">2x2</option>
        </select>
      </div>
      <div class="field">
        <label>宽度 W (mm)</label>
        <input type="number" id="W" value="2.5" step="0.1">
      </div>
      <div class="field">
        <label>旦尼尔 D (Den)</label>
        <input type="number" id="D" value="1200" step="10">
      </div>
      <div class="field">
        <label>节距 P (mm)</label>
        <input type="number" id="P" value="0.3" step="0.01">
      </div>
      <div class="field">
        <label>材料系数 k</label>
        <input type="number" id="k" value="0.01189" step="0.0001">
      </div>
      <div class="field">
        <label>密度系数 f</label>
        <input type="number" id="f" value="0.90" step="0.01">
      </div>
      <div class="field">
        <label>校准系数 K</label>
        <input type="number" id="K" value="1.00" step="0.01">
      </div>
      
      <button class="calc-btn" onclick="runCalc()">立即更新工艺计算</button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi">
      <div class="t">输出宽度</div>
      <div class="v" id="outW">-</div>
    </div>
    <div class="kpi">
      <div class="t">输出旦尼尔</div>
      <div class="v" id="outD">-</div>
    </div>
    <div class="kpi">
      <div class="t">编织角度</div>
      <div class="v" id="outA">-</div>
    </div>
    <div class="kpi">
      <div class="t">单丝直径</div>
      <div class="v" id="outd">-</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">🇨🇳 ©️王萌 ｜ 2026 </div>
  </div>

</div>

<script>
let calcMode = 'W';

function setMode(m) {
  calcMode = m;
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('m' + m).classList.add('active');
  
  // 处理只读状态
  const inputs = {
    'W': document.getElementById('W'),
    'D': document.getElementById('D'),
    'P': document.getElementById('P')
  };
  
  for(let key in inputs) {
    if(key === m) {
      inputs[key].readOnly = true;
    } else {
      inputs[key].readOnly = false;
    }
  }
}

function getM(c) {
  const mValue = { '1x1': 1.9, '1x2': 2.75, '2x2': 3.6 };
  return mValue[c] || 2;
}

function runCalc() {
  const N = parseFloat(document.getElementById('N').value) || 16;
  const craft = document.getElementById('craft').value;
  const k = parseFloat(document.getElementById('k').value) || 0.01189;
  const f = parseFloat(document.getElementById('f').value) || 0.9;
  const K = parseFloat(document.getElementById('K').value) || 1;
  
  let W = parseFloat(document.getElementById('W').value) || 0;
  let D = parseFloat(document.getElementById('D').value) || 0;
  let P = parseFloat(document.getElementById('P').value) || 0;

  const m = getM(craft);
  const A = Math.round(N/2) * m * k * f;

  // 核心逻辑计算
  if (calcMode === 'W') {
    // 根据当前输入的 P 和 D 计算 W
    let angleRad = Math.atan((2 * W) / P); // 迭代起始参考
    W = A * Math.sqrt(D) * Math.sin(angleRad) * K;
    document.getElementById('W').value = W.toFixed(2);
  } else if (calcMode === 'D') {
    // 根据当前输入的 W 和 P 计算 D
    let angleRad = Math.atan((2 * W) / P);
    D = Math.pow(W / (A * Math.sin(angleRad) * K), 2);
    document.getElementById('D').value = Math.round(D);
  } else if (calcMode === 'P') {
    // 根据当前输入的 W 和 D 计算 P
    let ratio = W / (A * Math.sqrt(D) * K);
    if (ratio < 1) {
      P = (2 * W) / Math.tan(Math.asin(ratio));
      document.getElementById('P').value = P.toFixed(3);
    }
  }

  // 最终显示
  const finalAngle = Math.atan((2 * W) / P) * 180 / Math.PI * 2;
  const d = k * Math.sqrt(D);

  document.getElementById('outW').innerHTML = W.toFixed(2) + '<span>mm</span>';
  document.getElementById('outD').innerHTML = Math.round(D) + '<span>D</span>';
  document.getElementById('outA').innerHTML = finalAngle.toFixed(1) + '<span>°</span>';
  document.getElementById('outd').innerHTML = d.toFixed(4) + '<span>mm</span>';
}

// 默认初始化
setMode('W');
</script>

</body>
</html>
