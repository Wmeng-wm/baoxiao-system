<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>单锭机工程级工艺计算器</title>

<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --sub:#64748b;
  --pri:#22c55e;
  --pri2:#16a34a;
}

body{
  margin:0;
  background:linear-gradient(180deg,#eef2ff,#f8fafc);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei";
  color:var(--text);
}

.wrap{
  max-width:920px;
  margin:auto;
  padding:18px 12px;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
  transition:.25s;
}

.card:hover{
  transform:translateY(-2px);
}

.title{
  font-size:22px;
  font-weight:800;
  letter-spacing:-0.3px;
}

.sub{
  font-size:13px;
  color:var(--sub);
  margin-top:4px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

input,select{
  width:100%;
  padding:11px;
  border-radius:12px;
  border:2px solid transparent;
  background:#f8fafc;
  font-size:14px;
  transition:.2s;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--pri);
  background:#fff;
  box-shadow:0 0 0 3px rgba(34,197,94,.15);
}

.highlight{
  background:#fef9c3;
}

.kpi{
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
  border-radius:16px;
  padding:16px;
  text-align:center;
  border:1px solid #bbf7d0;
}

.kpi .t{
  font-size:12px;
  color:#166534;
}

.kpi .v{
  font-size:24px;
  font-weight:900;
  margin-top:5px;
}

.footer{
  text-align:center;
  color:#94a3b8;
  font-size:12px;
  padding:10px 0;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <div class="title">单锭机工程级工艺计算器</div>
  <div class="sub">真实工艺模型 · 覆盖率修正 · 机台极限判断</div>
</div>

<div class="card">
<div class="grid">

<div>
<label>锭数</label>
<input id="N" value="17" oninput="calc()">
</div>

<div>
<label>结构</label>
<select id="craft" onchange="calc()">
<option value="1x1">1x1</option>
<option value="1x2" selected>1x2</option>
<option value="2x2">2x2</option>
</select>
</div>

<div>
<label>目标宽度 W</label>
<input id="W" class="highlight" value="2.5" oninput="mode='W';calc()">
</div>

<div>
<label>旦尼尔 D</label>
<input id="D" value="" oninput="mode='D';calc()">
</div>

<div>
<label>节距 P</label>
<input id="P" value="0.3" oninput="mode='P';calc()">
</div>

<div>
<label>材料系数 k</label>
<input id="k" value="0.01189" oninput="calc()">
</div>

<div>
<label>密度系数 f</label>
<input id="f" value="0.90" oninput="calc()">
</div>

<div>
<label>校准系数 K</label>
<input id="K" value="1.00" oninput="calc()">
</div>

</div>
</div>

<div class="card grid">

<div class="kpi">
<div class="t">宽度</div>
<div class="v" id="outW">-</div>
</div>

<div class="kpi">
<div class="t">旦尼尔</div>
<div class="v" id="outD">-</div>
</div>

<div class="kpi">
<div class="t">编织角度</div>
<div class="v" id="outA">-</div>
</div>

<div class="kpi">
<div class="t">单丝直径</div>
<div class="v" id="outd">-</div>
</div>

</div>

<div class="footer">🇨🇳©️王萌 2026 </div>

</div>

<script>

let mode = "W";

function getM(c){
  if(c==='1x1') return 1.9;
  if(c==='1x2') return 2.75;
  if(c==='2x2') return 3.6;
  return 2;
}

function calc(){

let N = parseFloat(NEl.value)||17;
let W = parseFloat(WEl.value)||0;
let D = parseFloat(DEl.value)||0;
let P = parseFloat(PEl.value)||0;
let k = parseFloat(kEl.value)||0.01189;
let f = Math.min(0.95, Math.max(0.75, parseFloat(fEl.value)||0.9));
let K = parseFloat(KEl.value)||1;

let m = getM(craftEl.value);

let A = Math.round(N/2)*m*k*f;
let d = k*Math.sqrt(D||1);

if(P < 2.5*d && D>0){
  outW.innerText="节距过小";
  outA.innerText="不可编织";
  outd.innerText=d.toFixed(4);
  return;
}

if(mode==="D" && W>0 && P>0){
  let cover=Math.sin(Math.atan((2*W)/P));
  D=Math.pow(W/(A*cover*K),2);
  DEl.value=D.toFixed(1);
}

if(mode==="W" && D>0 && P>0){
  let cover=Math.sin(Math.atan((2*W)/P));
  W=A*Math.sqrt(D)*cover*K;
  WEl.value=W.toFixed(2);
}

if(mode==="P" && D>0 && W>0){
  let target=W/(A*Math.sqrt(D)*K);
  if(target<1){
    P=(2*W)/Math.tan(Math.asin(target));
    PEl.value=P.toFixed(3);
  }
}

let angle=Math.atan((2*W)/P)*180/Math.PI*2;

outW.innerText=W.toFixed(2)+" mm";
outD.innerText=D.toFixed(1)+" D";
outA.innerText=angle.toFixed(1)+"°";
outd.innerText=(k*Math.sqrt(D)).toFixed(4)+" mm";

}

const NEl=document.getElementById('N');
const WEl=document.getElementById('W');
const DEl=document.getElementById('D');
const PEl=document.getElementById('P');
const kEl=document.getElementById('k');
const fEl=document.getElementById('f');
const KEl=document.getElementById('K');
const craftEl=document.getElementById('craft');

const outW=document.getElementById('outW');
const outD=document.getElementById('outD');
const outA=document.getElementById('outA');
const outd=document.getElementById('outd');

calc();

</script>

</body>
</html>
